name: Lighthouse CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1
      - name: Install Jekyll dependencies
        run: |
          gem install bundler
          bundle config set path vendor/bundle
          bundle install
      - name: Start Jekyll server
        run: bundle exec jekyll serve --detach --host 127.0.0.1 --port 4000
      - name: Install Lighthouse
        run: npm install -g lighthouse
      - name: Run Lighthouse accessibility audit
        run: lighthouse http://127.0.0.1:4000/ --only-categories=accessibility --output=json --output-path=./lighthouse-accessibility.json --chrome-flags="--no-sandbox"
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-accessibility-report
          path: ./lighthouse-accessibility.json
